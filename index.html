<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        .link-container {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }
        .link-button {
            display: block;
            background-color: #ffffff;
            color: #333;
            text-decoration: none;
            text-align: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: transform 0.2s;
        }
        .link-button:hover {
            transform: scale(1.02);
            background-color: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <img src="your-photo.jpg" alt="Profile" class="profile-img">
    <h3>Lorong</h3>

    <div class="link-container">
        <a href="https://facebook.com/..." class="link-button">Tipme (โดเนทขึ้นจอ)</a>
        <a href="https://www.youtube.com/@Lorong-TH" class="link-button">Youtube</a>
        <a href="https://www.twitch.tv/lorong_" class="link-button">Twitch</a>
        <a href="https://www.tiktok.com/@lorong_4c" class="link-button">TikTok</a>
    </div>

</body>
</html>
